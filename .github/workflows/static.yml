          URLS
          echo "mirrored $ok/$total (missing $miss)"
          # A wholesale failure (host down, DNS) should not silently ship a
          # site with no artwork - only tolerate the known sparse 404s.
          if [ "$ok" -lt $((total * 9 / 10)) ]; then
            echo "::error::only $ok/$total assets mirrored"; exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
