name: Playwright Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install xsltproc (static HTML generation tests)
        run: sudo apt-get update && sudo apt-get install -y xsltproc
      - name: Install dependencies
        run: npm install
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests
      - name: Upload rendering screenshots
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: rendering-screenshots
          path: test-screenshots/
          retention-days: 14
          if-no-files-found: ignore
      - name: Attach screenshots to the release
        if: always() && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip -r rendering-screenshots.zip test-screenshots
          gh release upload "${{ github.event.release.tag_name }}" rendering-screenshots.zip --clobber
      - name: Upload report on failure
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
