# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # festodidacticsw.azurewebsites.net serves the scene assets without an
      # Access-Control-Allow-Origin header, so the browser cannot use them as
      # WebGL textures/models when the editor runs on github.io. Mirror them
      # into the Pages artifact instead of depending on a public CORS proxy.
      # index.htm rewrites Festo URLs to these assets/ paths and keeps the
      # public proxies only as a fallback for anything missing here.
      #
      # The URL list is inline (not a separate manifest file) because it is
      # derived from static-live/, which is gitignored and absent from a CI
      # checkout. Each local path is the URL minus the host prefix, so adding
      # an asset means adding one line below.
      - name: Restore mirrored assets
        id: assets-cache
        uses: actions/cache@v4
        with:
          path: assets
          # Keyed on this workflow: editing the list re-downloads, an unrelated
          # push restores the mirror without touching the Festo host.
          key: festo-assets-${{ hashFiles('.github/workflows/static.yml') }}

      - name: Mirror Festo assets
        if: steps.assets-cache.outputs.cache-hit != 'true'
        env:
          BASE: https://festodidacticsw.azurewebsites.net/ar/
        run: |
          ok=0; miss=0; total=0
          while read -r url; do
            [ -n "$url" ] || continue
            total=$((total + 1))
            # Local path mirrors the remote layout; %20/%5B/%5D become literal
            # characters so mps/MPS%20%5BEN%5D/ lands as "mps/MPS [EN]/".
            rel="${url#$BASE}"
            local_path="assets/$(printf '%b' "${rel//%/\\x}")"
            mkdir -p "$(dirname "$local_path")"
            # -g: brackets are path characters here, not a curl glob
            if curl -sfg --retry 3 --retry-delay 2 --max-time 60 -o "$local_path" "$url"; then
              ok=$((ok + 1))
            else
              # Some IMGTARGET markers are 404 upstream; the editor's proxy
              # fallback covers a missing mirror entry, so do not fail the deploy
              echo "::warning::asset unavailable upstream: $url"
              rm -f "$local_path"; miss=$((miss + 1))
            fi
